<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Button</title>
  <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
  <style>
    :root{
      --bg:#fff7f3;
      --panel:#fffdfa;
      --ink:#6b5148;
      --stroke:#8b6d62;
      --soft:#f8d5df;
      --soft2:#d7f1e0;
      --soft3:#fde4a8;
      --soft4:#dce8ff;
      --soft5:#f2ddff;
      --brightness:1;
      --textScale:1;
    }

    *{box-sizing:border-box}
    html{font-size:16px}

    body{
      margin:0;
      font-family:"Trebuchet MS","Comic Sans MS","Marker Felt",sans-serif;
      color:var(--ink);
      min-height:100vh;
      background:var(--bg);
      filter:brightness(var(--brightness));
      transition:.3s ease;
      font-size:calc(16px * var(--textScale));
    }

    body.dark{
      --bg:#2e242b;
      --panel:rgba(63,48,58,0.9);
      --ink:#f8ede7;
      --stroke:#f0d8cc;
      --soft:#6b5360;
      --soft2:#4b3945;
      --soft3:#5a4652;
      --soft4:#43343e;
      --soft5:#352a31;
      background:radial-gradient(circle at 20% 20%, #4a3944 0%, #2e242b 45%, #21181f 100%);
    }

    .page{
      max-width:1200px;
      margin:0 auto;
      padding:32px 20px 40px;
    }

    .top{
      display:grid;
      grid-template-columns:170px 1fr 320px;
      gap:16px;
      margin-bottom:32px;
    }

    .plain-top{
      padding:8px;
    }

    .tiny-title{
      font-size:calc(12px * var(--textScale));
      font-weight:900;
      text-transform:uppercase;
      letter-spacing:.16em;
      color:#9a7f73;
      margin-bottom:6px;
    }
    body.dark .tiny-title{ color:#dec8be; }

    .rating-stars{
      display:flex;
      gap:4px;
      align-items:center;
      padding:4px 2px;
      user-select:none;
    }

    .star{
      font-size:calc(22px * var(--textScale));
      color:#d2bdb0;
    }
    .star.filled{ color:#d69a13; }

    .rating-value{
      margin-top:6px;
      font-size:calc(14px * var(--textScale));
      font-weight:900;
    }

    .quote-card{
      border:3px solid var(--stroke);
      border-radius:34px;
      padding:20px;
      background:var(--panel);
      box-shadow:0 10px 0 rgba(90,70,60,.10);
      transition:.3s ease;
      transform-origin:top center;
      backdrop-filter:blur(6px);
      background-size:cover;
      background-position:center;
    }

    .quote-grid{
      display:grid;
      grid-template-columns:110px 1fr;
      gap:16px;
      align-items:start;
    }

    .profile-col{
      display:flex;
      flex-direction:column;
      align-items:center;
      gap:12px;
    }

    .avatar-wrap{
      position:relative;
      width:96px;
      height:96px;
    }

    .avatar{
      width:96px;
      height:96px;
      object-fit:cover;
      border-radius:999px;
      border:3px solid var(--stroke);
      display:block;
    }

    .spark-badge{
      position:absolute;
      right:-4px;
      bottom:-4px;
      width:28px;
      height:28px;
      display:flex;
      align-items:center;
      justify-content:center;
      border:2px solid var(--stroke);
      border-radius:999px;
      background:var(--soft);
      font-size:calc(14px * var(--textScale));
    }

    .profile-caption{
      text-align:center;
    }

    .profile-caption .mini{
      font-size:calc(12px * var(--textScale));
      font-weight:900;
      text-transform:uppercase;
      letter-spacing:.14em;
      color:#9a7f73;
    }
    body.dark .profile-caption .mini{ color:#dfc9bf; }

    .profile-caption .name{
      margin-top:4px;
      font-size:calc(16px * var(--textScale));
      font-weight:900;
    }

    .quote-inner{
      border-radius:24px;
      padding:16px;
      background:rgba(255,255,255,.85);
      transition:.3s ease;
    }
    body.dark .quote-inner{ background:#3b2e37; }
    .quote-inner.overlay{ background:rgba(255,255,255,.42); }

    .quote-head{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:12px;
      margin-bottom:8px;
    }

    .pill{
      display:inline-flex;
      align-items:center;
      padding:2px 8px;
      border-radius:999px;
      font-size:calc(10px * var(--textScale));
      font-weight:900;
      background:var(--soft2);
    }

    .quote-text{
      font-size:calc(16px * var(--textScale));
      line-height:1.8;
      min-height:72px;
    }

    .subtle{
      margin-top:10px;
      font-size:calc(12px * var(--textScale));
      color:#8f7368;
    }
    body.dark .subtle{ color:#dfc9bf; }

    .name-panel{
      padding:8px;
    }

    .name-display{
      font-size:calc(18px * var(--textScale));
      font-weight:900;
    }

    .name-help{
      margin-top:4px;
      font-size:calc(14px * var(--textScale));
      color:#8f7368;
    }
    body.dark .name-help{ color:#dfc9bf; }

    .name-input{
      width:100%;
      border:2.5px solid var(--stroke);
      border-radius:18px;
      padding:14px 16px;
      font-size:calc(16px * var(--textScale));
      font-weight:900;
      outline:none;
      background:#fff;
      color:var(--ink);
    }
    body.dark .name-input{ background:#352a31; }

    .save-name{
      margin-top:12px;
      width:100%;
      border:2.5px solid var(--stroke);
      border-radius:18px;
      padding:12px 14px;
      background:var(--soft2);
      color:var(--ink);
      font-weight:900;
      cursor:pointer;
      font-size:calc(14px * var(--textScale));
    }

    .button-grid{
      display:grid;
      grid-template-columns:repeat(5, 1fr);
      gap:28px 28px;
    }

    .btn-wrap{
      display:flex;
      flex-direction:column;
      align-items:center;
      gap:6px;
      position:relative;
    }

    .cute-btn{
      width:74px;
      height:74px;
      border:2.5px solid var(--stroke);
      border-radius:28px;
      box-shadow:0 5px 0 rgba(80,60,50,.12);
      display:flex;
      align-items:center;
      justify-content:center;
      background:#fff;
      color:var(--ink);
      cursor:pointer;
      user-select:none;
      transition:.2s ease;
      position:relative;
      font-size:calc(24px * var(--textScale));
    }

    .cute-btn.round{ border-radius:999px; }

    .cute-btn:active{
      transform:scale(.93) rotate(-1deg);
    }

    .btn-label{
      font-size:calc(13px * var(--textScale));
      font-weight:700;
      text-align:center;
      line-height:1.2;
    }

    .tiny-heart{
      font-size:calc(14px * var(--textScale));
      cursor:pointer;
      color:#b28f88;
      line-height:1;
      user-select:none;
    }

    .tiny-heart.active{
      color:#ef5b95;
    }

    .meow-pop{
      position:absolute;
      top:-42px;
      left:50%;
      transform:translateX(-50%);
      z-index:30;
      border:2.5px solid var(--stroke);
      background:#fff;
      color:var(--ink);
      padding:4px 12px;
      border-radius:14px;
      font-size:calc(12px * var(--textScale));
      font-weight:900;
      box-shadow:0 5px 0 rgba(80,60,50,.12);
      display:none;
    }
    body.dark .meow-pop{ background:#4a3944; }

    .favorite-pop{
      position:absolute;
      bottom:102px;
      left:50%;
      transform:translateX(-50%);
      z-index:30;
      width:180px;
      border:2.5px solid var(--stroke);
      border-radius:18px;
      background:#fff;
      color:var(--ink);
      padding:12px;
      font-size:calc(12px * var(--textScale));
      box-shadow:0 5px 0 rgba(80,60,50,.12);
      display:none;
      line-height:1.6;
    }
    body.dark .favorite-pop{ background:#463640; }

    .favorite-pop .pop-title{
      font-weight:900;
      margin-bottom:6px;
    }

    .spark-burst{
      pointer-events:none;
      position:absolute;
      inset:-10px;
      display:none;
      font-size:calc(18px * var(--textScale));
    }
    .spark-burst span{
      position:absolute;
      animation:pop .8s ease forwards;
    }
    .spark-burst span:nth-child(1){ left:6px; top:4px; }
    .spark-burst span:nth-child(2){ right:3px; top:18px; font-size:calc(14px * var(--textScale)); }
    .spark-burst span:nth-child(3){ left:4px; bottom:8px; font-size:calc(14px * var(--textScale)); }
    .spark-burst span:nth-child(4){ right:12px; bottom:0; }
    @keyframes pop{
      0%{opacity:0; transform:scale(.5)}
      40%{opacity:1; transform:scale(1.15)}
      100%{opacity:0; transform:scale(1.5)}
    }

    .wiggle{
      animation:wiggle .65s ease-in-out infinite;
    }
    @keyframes wiggle{
      0%{transform:translateX(0) rotate(0deg)}
      25%{transform:translateX(-1.5px) rotate(-2deg)}
      50%{transform:translateX(1.5px) rotate(2deg)}
      75%{transform:translateX(-1.5px) rotate(-2deg)}
      100%{transform:translateX(0) rotate(0deg)}
    }

    .hidden{ display:none !important; }
    .drag-over{ outline:3px dashed #ef5b95; outline-offset:4px; }

    @media (max-width: 980px){
      .top{ grid-template-columns:1fr; }
      .button-grid{ grid-template-columns:repeat(4,1fr); }
    }

    @media (max-width: 640px){
      .button-grid{ grid-template-columns:repeat(3,1fr); }
      .quote-grid{ grid-template-columns:1fr; }
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="top">
      <div class="plain-top">
        <div class="tiny-title" id="ratingTitle">Rating</div>
        <div class="rating-stars" id="ratingStars"></div>
        <div class="rating-value" id="ratingValue">3/5</div>
      </div>

      <div class="quote-card" id="quoteCard">
        <div class="quote-grid">
          <div class="profile-col">
            <div class="avatar-wrap">
              <img class="avatar" id="avatarImg" alt="avatar">
              <div class="spark-badge">✨</div>
            </div>
            <div class="profile-caption">
              <div class="mini" id="profileTitle">Profile Photo</div>
              <div class="name" id="profileName">user name</div>
            </div>
          </div>

          <div class="quote-inner" id="quoteInner">
            <div class="quote-head">
              <div class="tiny-title" style="margin:0" id="quoteTitle">Quote</div>
              <div class="pill" id="statusPill">Ready</div>
            </div>
            <div class="quote-text" id="quoteText">“Tiny details make everything sweeter.”</div>
            <div class="subtle" id="quoteHint">tap name button to edit</div>
          </div>
        </div>
      </div>

      <div class="name-panel">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;">
          <div class="tiny-title" id="nameTitle">Name</div>
          <div style="font-size:calc(10px * var(--textScale));font-weight:900;" id="editWord">edit</div>
        </div>

        <div id="nameView">
          <div class="name-display" id="nameDisplay">user name</div>
          <div class="name-help" id="nameHelp">Tap the name button below to change it.</div>
        </div>

        <div id="nameEdit" class="hidden">
          <input id="nameInput" class="name-input" value="user name" />
          <button id="saveNameBtn" class="save-name">Save Name</button>
        </div>
      </div>
    </div>

    <div class="button-grid" id="buttonGrid"></div>
  </div>

  <script>
    function makeAvatarData(bg, face, hair) {
      const svg = `
      <svg xmlns="http://www.w3.org/2000/svg" width="200" height="200">
        <rect width="200" height="200" rx="100" fill="${bg}"/>
        <circle cx="100" cy="108" r="46" fill="${face}"/>
        <path d="M55 95c0-28 20-52 45-52 28 0 48 20 48 50v8c-10-7-24-11-47-11-22 0-36 3-46 10V95z" fill="${hair}"/>
        <circle cx="83" cy="110" r="4" fill="#5c463f"/>
        <circle cx="118" cy="110" r="4" fill="#5c463f"/>
        <path d="M89 127c7 6 16 6 23 0" stroke="#a76d6d" stroke-width="4" fill="none" stroke-linecap="round"/>
        <circle cx="67" cy="121" r="6" fill="#f6b4b6" opacity=".65"/>
        <circle cx="133" cy="121" r="6" fill="#f6b4b6" opacity=".65"/>
      </svg>`;
      return "data:image/svg+xml;charset=utf-8," + encodeURIComponent(svg);
    }

    const quotesEn = [
      "Tiny details make everything sweeter.",
      "Cute interfaces can still feel premium.",
      "Soft shapes, playful motion, lovely moments.",
      "Buttons should feel like little characters.",
      "A small interaction can feel magical.",
      "Gentle colors make space for joy."
    ];

    const quotesZh = [
      "小细节会让一切更可爱。",
      "可爱也可以很精致。",
      "柔软的形状、轻快的动效、温柔的感觉。",
      "按钮也可以像小角色一样有个性。",
      "一个小互动也可以很有魔法感。",
      "柔和的颜色会让页面更有呼吸感。"
    ];

    const avatars = [
      makeAvatarData("#ffdbe7", "#f5d0b5", "#6c4b43"),
      makeAvatarData("#dce7ff", "#f3d2b8", "#5a4153"),
      makeAvatarData("#e0f5df", "#f1cfb2", "#6a553f"),
      makeAvatarData("#fff0c9", "#f3cfb4", "#704d3b")
    ];

    const themes = [
      {
        bg:"#fff7f3", panel:"#fffdfa", ink:"#6b5148", stroke:"#8b6d62",
        soft:"#f8d5df", soft2:"#d7f1e0", soft3:"#fde4a8", soft4:"#dce8ff", soft5:"#f2ddff"
      },
      {
        bg:"#fcf7ff", panel:"#fffefe", ink:"#61506b", stroke:"#7d6a8c",
        soft:"#e4d6ff", soft2:"#d7eef8", soft3:"#ffe0c8", soft4:"#dff3dc", soft5:"#fff0b8"
      },
      {
        bg:"#fbfff6", panel:"#fffefb", ink:"#5f5848", stroke:"#83795f",
        soft:"#ffe0cf", soft2:"#dcf5d8", soft3:"#fff0b8", soft4:"#dde7ff", soft5:"#f2dcff"
      }
    ];

    const state = {
      themeIndex: 0,
      darkMode: false,
      avatar: avatars[0],
      quote: quotesEn[0],
      isChinese: false,
      fontScale: 1,
      brightness: 1,
      notifications: true,
      locked: false,
      countdown: 10,
      timerRunning: false,
      timerInterval: null,
      stars: 3,
      playing: false,
      name: "user name",
      editingName: false,
      nameDraft: "user name",
      quoteBgImage: "",
      favoriteOpen: false,
      savedCard: false,
      hearted: {},
      removed: [],
      dragged: null,
      zoomedIn: false,
      dice: 1
    };

    const buttonKeys = [
      "profile","notify","theme","copy","quote","favorite","lock","timer","palette","text",
      "language","sparkle","reset","search","brightness","upload","motion","name","bin",
      "rating","clock","dice","zoom","avatar","save"
    ];

    function t(en, zh){ return state.isChinese ? zh : en; }
    function currentQuotes(){ return state.isChinese ? quotesZh : quotesEn; }
    function randomFrom(arr){ return arr[Math.floor(Math.random() * arr.length)]; }

    function labels(){
      return {
        profile: t("Profile","头像"),
        notify: t("Notify","提醒"),
        theme: t("Theme","主题"),
        copy: t("Copy","复制"),
        quote: t("Quote","句子"),
        favorite: t("Favorite","收藏"),
        lock: t("Lock","锁定"),
        timer: t("Timer","计时"),
        palette: t("Palette","配色"),
        text: t("Text","文字"),
        language: t("Language","语言"),
        sparkle: t("Sparkle","闪光"),
        reset: t("Reset","重置"),
        search: t("Search","搜索"),
        brightness: t("Brightness","亮度"),
        upload: t("Upload","上传"),
        motion: t("Motion","动效"),
        name: t("Name","名字"),
        bin: t("Bin","回收"),
        rating: t("Rating","评分"),
        clock: t("Clock","时钟"),
        dice: t("Dice","骰子"),
        zoom: t("Zoom","缩放"),
        avatar: t("Avatar","头像切换"),
        save: t("Save","保存")
      };
    }

    function applyTheme(){
      const root = document.documentElement;
      const theme = themes[state.themeIndex % themes.length];

      if(!state.darkMode){
        root.style.setProperty("--bg", theme.bg);
        root.style.setProperty("--panel", theme.panel);
        root.style.setProperty("--ink", theme.ink);
        root.style.setProperty("--stroke", theme.stroke);
        root.style.setProperty("--soft", theme.soft);
        root.style.setProperty("--soft2", theme.soft2);
        root.style.setProperty("--soft3", theme.soft3);
        root.style.setProperty("--soft4", theme.soft4);
        root.style.setProperty("--soft5", theme.soft5);
      }

      root.style.setProperty("--brightness", state.brightness);
      root.style.setProperty("--textScale", state.fontScale);

      document.body.classList.toggle("dark", state.darkMode);
      document.body.style.overflow = state.locked ? "hidden" : "auto";
    }

    function renderTop(){
      document.getElementById("profileName").textContent = state.name;
      document.getElementById("nameDisplay").textContent = state.name;
      document.getElementById("avatarImg").src = state.avatar;
      document.getElementById("quoteText").textContent = `“${state.quote}”`;

      document.getElementById("statusPill").textContent = state.savedCard
        ? t("Saved","已保存")
        : t("Ready","完成");

      document.getElementById("ratingTitle").textContent = t("Rating","评分");
      document.getElementById("profileTitle").textContent = t("Profile Photo","头像卡片");
      document.getElementById("quoteTitle").textContent = t("Quote","句子");
      document.getElementById("quoteHint").textContent = t("tap name button to edit","点 name 按钮修改名字");
      document.getElementById("nameTitle").textContent = t("Name","名字");
      document.getElementById("editWord").textContent = t("edit","编辑");
      document.getElementById("nameHelp").textContent = t("Tap the name button below to change it.","点下方 name 按钮修改");
      document.getElementById("saveNameBtn").textContent = t("Save Name","保存名字");

      const quoteCard = document.getElementById("quoteCard");
      const quoteInner = document.getElementById("quoteInner");
      quoteCard.style.transform = state.zoomedIn ? "scale(1.12)" : "scale(1)";
      if(state.quoteBgImage){
        quoteCard.style.backgroundImage = `linear-gradient(rgba(255,255,255,0.12), rgba(255,255,255,0.12)), url(${state.quoteBgImage})`;
        quoteInner.classList.add("overlay");
      } else {
        quoteCard.style.backgroundImage = "none";
        quoteInner.classList.remove("overlay");
      }

      document.getElementById("nameView").classList.toggle("hidden", state.editingName);
      document.getElementById("nameEdit").classList.toggle("hidden", !state.editingName);
      document.getElementById("nameInput").value = state.nameDraft;

      const stars = document.getElementById("ratingStars");
      stars.innerHTML = "";
      for(let i=1;i<=5;i++){
        const s = document.createElement("span");
        s.className = "star" + (i <= state.stars ? " filled" : "");
        s.textContent = "★";
        stars.appendChild(s);
      }
      document.getElementById("ratingValue").textContent = `${state.stars}/5`;
    }

    function buttonBg(key){
      const theme = themes[state.themeIndex % themes.length];
      switch(key){
        case "profile": return theme.soft;
        case "notify": return state.notifications ? theme.soft2 : "#f6ddd4";
        case "theme": return state.darkMode ? "#d7c8ff" : theme.soft3;
        case "copy": return state.copied ? "#d7f3db" : theme.soft5;
        case "quote": return theme.soft3;
        case "favorite": return state.favoriteOpen ? "#ffbfd4" : "#ffe9f1";
        case "lock": return state.locked ? "#ddd6ff" : "#e7f8dd";
        case "timer": return theme.soft4;
        case "palette": return theme.soft;
        case "text": return theme.soft5;
        case "language": return theme.soft2;
        case "sparkle": return theme.soft3;
        case "reset": return "#ece4de";
        case "search": return theme.soft4;
        case "brightness": return theme.soft2;
        case "upload": return theme.soft4;
        case "motion": return theme.soft;
        case "name": return theme.soft5;
        case "bin": return state.dragged ? "#ffd9d1" : "#ffe7e1";
        case "rating": return theme.soft3;
        case "clock": return theme.soft4;
        case "dice": return theme.soft5;
        case "zoom": return theme.soft2;
        case "avatar": return theme.soft;
        case "save": return theme.soft3;
      }
      return "#fff";
    }

    function iconFor(key){
      switch(key){
        case "profile": return `<img src="${state.avatar}" style="width:100%;height:100%;border-radius:999px;object-fit:cover;">`;
        case "notify": return `🔔`;
        case "theme": return state.darkMode ? `☀️` : `🌙`;
        case "copy": return state.copied ? `✔️` : `📋`;
        case "quote": return `🔀`;
        case "favorite": return state.favoriteOpen ? `<span style="color:#e96097">♥</span>` : `♡`;
        case "lock": return state.locked ? `🔒` : `🔓`;
        case "timer":
          return `<div style="font-size:calc(11px * var(--textScale));font-weight:900;text-align:center;line-height:1.1">${state.timerRunning ? t("run","运行") : t("tap","点击")}<div style="font-size:calc(20px * var(--textScale));margin-top:4px">${state.countdown}</div></div>`;
        case "palette": return `🎨`;
        case "text":
          return `<div style="font-size:calc(11px * var(--textScale));font-weight:900;text-align:center;">Aa<div>${state.fontScale.toFixed(1)}x</div></div>`;
        case "language":
          return `<div style="font-size:calc(11px * var(--textScale));font-weight:900;text-align:center;">🌐<div>${state.isChinese ? "中文" : "EN"}</div></div>`;
        case "sparkle": return `✨`;
        case "reset": return `↺`;
        case "search": return `<div style="font-size:calc(11px * var(--textScale));font-weight:900;text-align:center;">🔎<div>↗</div></div>`;
        case "brightness":
          return `<div style="font-size:calc(11px * var(--textScale));font-weight:900;text-align:center;">☀️<div>${state.brightness === 1.15 ? t("bright","偏亮") : state.brightness === 0.9 ? t("soft","柔和") : t("normal","正常")}</div></div>`;
        case "upload": return `📤`;
        case "motion": return state.playing ? `⏸` : `▶`;
        case "name": return `✏️`;
        case "bin":
          return `<div style="position:relative">🗑️<span style="position:absolute;right:-14px;top:-10px;font-size:calc(10px * var(--textScale));font-weight:900;border:2px solid var(--stroke);border-radius:999px;padding:1px 5px;background:#fff;">${state.removed.length}</span></div>`;
        case "rating": return `★`;
        case "clock":
          return `<div style="font-size:calc(11px * var(--textScale));font-weight:900;text-align:center;">🕒<div>${new Date().toLocaleTimeString([], {hour:"2-digit", minute:"2-digit"})}</div></div>`;
        case "dice":
          return `<div style="font-size:calc(11px * var(--textScale));font-weight:900;text-align:center;">🎲<div>${state.dice}</div></div>`;
        case "zoom":
          return `<div style="font-size:calc(11px * var(--textScale));font-weight:900;text-align:center;">${state.zoomedIn ? "🗕" : "🗖"}<div>${state.zoomedIn ? t("in","放大") : t("out","还原")}</div></div>`;
        case "avatar": return `📷`;
        case "save": return `💾`;
      }
      return `•`;
    }

    function showMeow(){
      const pop = document.getElementById("meowPop");
      if(!pop) return;
      pop.style.display = "block";
      clearTimeout(pop._timer);
      pop._timer = setTimeout(() => pop.style.display = "none", 1300);
    }

    function showSpark(){
      const spark = document.getElementById("sparkBurst");
      if(!spark) return;
      spark.style.display = "block";
      clearTimeout(spark._timer);
      spark._timer = setTimeout(() => spark.style.display = "none", 900);
    }

    function startTimer(){
      if(state.timerRunning) return;
      state.timerRunning = true;
      state.timerInterval = setInterval(() => {
        if(state.countdown > 0){
          state.countdown -= 1;
          renderButtons();
        } else {
          clearInterval(state.timerInterval);
          state.timerInterval = null;
          state.timerRunning = false;
          renderButtons();
        }
      }, 1000);
    }

    function stopTimer(){
      if(state.timerInterval){
        clearInterval(state.timerInterval);
        state.timerInterval = null;
      }
      state.timerRunning = false;
    }

    function renderButtons(){
      const grid = document.getElementById("buttonGrid");
      grid.innerHTML = "";
      const map = labels();

      buttonKeys.forEach((key) => {
        if(state.removed.includes(key)) return;

        const wrap = document.createElement("div");
        wrap.className = "btn-wrap";

        if(key === "notify"){
          const meow = document.createElement("div");
          meow.className = "meow-pop";
          meow.id = "meowPop";
          meow.textContent = "meow";
          wrap.appendChild(meow);
        }

        if(key === "favorite"){
          const pop = document.createElement("div");
          pop.className = "favorite-pop";
          pop.id = "favoritePop";
          pop.style.display = state.favoriteOpen ? "block" : "none";
          const list = buttonKeys.filter(k => state.hearted[k]).map(k => map[k]);
          pop.innerHTML = `<div class="pop-title">${t("hearted buttons","已按心的按钮")}</div><div>${list.length ? list.join(" · ") : t("none yet","还没有")}</div>`;
          wrap.appendChild(pop);
        }

        if(key === "sparkle"){
          const spark = document.createElement("div");
          spark.className = "spark-burst";
          spark.id = "sparkBurst";
          spark.innerHTML = `<span>✨</span><span>⭐</span><span>✨</span><span>💫</span>`;
          wrap.appendChild(spark);
        }

        const btn = document.createElement("button");
        btn.className = "cute-btn" + ((key === "profile" || key === "theme" || key === "favorite" || key === "avatar" || key === "sparkle") ? " round" : "");
        if(state.playing) btn.classList.add("wiggle");
        btn.style.background = buttonBg(key);
        btn.draggable = key !== "bin";
        btn.innerHTML = iconFor(key);
        btn.addEventListener("click", () => handleButton(key));

        if(key !== "bin"){
          btn.addEventListener("dragstart", () => state.dragged = key);
          btn.addEventListener("dragend", () => state.dragged = null);
        } else {
          btn.addEventListener("dragover", (e) => {
            e.preventDefault();
            btn.classList.add("drag-over");
          });
          btn.addEventListener("dragleave", () => btn.classList.remove("drag-over"));
          btn.addEventListener("drop", (e) => {
            e.preventDefault();
            btn.classList.remove("drag-over");
            if(state.dragged && state.dragged !== "bin" && !state.removed.includes(state.dragged)){
              state.removed.push(state.dragged);
              state.dragged = null;
              render();
            }
          });
        }

        const label = document.createElement("div");
        label.className = "btn-label";
        label.textContent = map[key];

        const heart = document.createElement("div");
        heart.className = "tiny-heart" + (state.hearted[key] ? " active" : "");
        heart.innerHTML = state.hearted[key] ? "♥" : "♡";
        if(state.playing) heart.classList.add("wiggle");
        heart.addEventListener("click", (e) => {
          e.stopPropagation();
          state.hearted[key] = !state.hearted[key];
          render();
        });

        wrap.appendChild(btn);
        wrap.appendChild(label);
        wrap.appendChild(heart);
        grid.appendChild(wrap);
      });
    }

    function render(){
      applyTheme();
      renderTop();
      renderButtons();
    }

    function handleButton(key){
      switch(key){
        case "profile":
          document.getElementById("profileUpload").click();
          break;
        case "notify":
          state.notifications = !state.notifications;
          render();
          showMeow();
          break;
        case "theme":
          state.darkMode = !state.darkMode;
          render();
          break;
        case "copy":
          navigator.clipboard.writeText("copy any thing");
          state.copied = true;
          render();
          setTimeout(() => {
            state.copied = false;
            render();
          }, 1000);
          break;
        case "quote":
          state.quote = randomFrom(currentQuotes());
          render();
          break;
        case "favorite":
          state.favoriteOpen = !state.favoriteOpen;
          render();
          break;
        case "lock":
          state.locked = !state.locked;
          render();
          break;
        case "timer":
          if(state.countdown === 0) state.countdown = 10;
          startTimer();
          renderButtons();
          break;
        case "palette":
          state.themeIndex += 1;
          render();
          break;
        case "text":
          state.fontScale = state.fontScale >= 1.5 ? 1 : +(state.fontScale + 0.15).toFixed(2);
          document.documentElement.style.setProperty("--textScale", state.fontScale);
          renderTop();
          renderButtons();
          break;
        case "language":
          state.isChinese = !state.isChinese;
          if(!currentQuotes().includes(state.quote)) state.quote = currentQuotes()[0];
          render();
          break;
        case "sparkle":
          render();
          showSpark();
          break;
        case "reset":
          stopTimer();
          Object.assign(state, {
            themeIndex: 0,
            darkMode: false,
            avatar: avatars[0],
            quote: quotesEn[0],
            isChinese: false,
            fontScale: 1,
            brightness: 1,
            notifications: true,
            locked: false,
            countdown: 10,
            timerRunning: false,
            stars: 3,
            playing: false,
            name: "user name",
            editingName: false,
            nameDraft: "user name",
            quoteBgImage: "",
            favoriteOpen: false,
            savedCard: false,
            hearted: {},
            removed: [],
            dragged: null,
            zoomedIn: false,
            dice: 1
          });
          render();
          break;
        case "search":
          window.open("https://www.google.com", "_blank");
          break;
        case "brightness":
          state.brightness = state.brightness === 1 ? 1.15 : state.brightness === 1.15 ? 0.9 : 1;
          render();
          break;
        case "upload":
          document.getElementById("quoteBgUpload").click();
          break;
        case "motion":
          state.playing = !state.playing;
          render();
          break;
        case "name":
          state.editingName = !state.editingName;
          render();
          if(state.editingName){
            setTimeout(() => document.getElementById("nameInput").focus(), 30);
          }
          break;
        case "bin":
          if(state.removed.length){
            state.removed = [];
            render();
          }
          break;
        case "rating":
          state.stars = state.stars >= 5 ? 1 : state.stars + 1;
          renderTop();
          renderButtons();
          break;
        case "clock":
          renderButtons();
          break;
        case "dice":
          state.dice = Math.floor(Math.random() * 6) + 1;
          renderButtons();
          break;
        case "zoom":
          state.zoomedIn = !state.zoomedIn;
          renderTop();
          renderButtons();
          break;
        case "avatar":
          state.avatar = avatars[(avatars.indexOf(state.avatar) + 1) % avatars.length];
          renderTop();
          renderButtons();
          break;
        case "save":
          html2canvas(document.getElementById("quoteCard"), {
            backgroundColor: null,
            scale: 2
          }).then((canvas) => {
            const link = document.createElement("a");
            link.download = "profile-card.png";
            link.href = canvas.toDataURL("image/png");
            link.click();
            state.savedCard = true;
            renderTop();
            setTimeout(() => {
              state.savedCard = false;
              renderTop();
            }, 1300);
          });
          break;
      }
    }

    document.getElementById("ratingStars").addEventListener("click", () => {
      state.stars = state.stars >= 5 ? 1 : state.stars + 1;
      renderTop();
      renderButtons();
    });

    document.getElementById("saveNameBtn").addEventListener("click", () => {
      const v = document.getElementById("nameInput").value.trim() || "user name";
      state.name = v;
      state.nameDraft = v;
      state.editingName = false;
      renderTop();
    });

    const profileUpload = document.createElement("input");
    profileUpload.type = "file";
    profileUpload.accept = "image/*";
    profileUpload.id = "profileUpload";
    profileUpload.className = "hidden";
    profileUpload.addEventListener("change", (e) => {
      const file = e.target.files[0];
      if(!file) return;
      const reader = new FileReader();
      reader.onload = () => {
        state.avatar = reader.result;
        renderTop();
        renderButtons();
      };
      reader.readAsDataURL(file);
    });
    document.body.appendChild(profileUpload);

    const quoteBgUpload = document.createElement("input");
    quoteBgUpload.type = "file";
    quoteBgUpload.accept = "image/*";
    quoteBgUpload.id = "quoteBgUpload";
    quoteBgUpload.className = "hidden";
    quoteBgUpload.addEventListener("change", (e) => {
      const file = e.target.files[0];
      if(!file) return;
      const reader = new FileReader();
      reader.onload = () => {
        state.quoteBgImage = reader.result;
        renderTop();
      };
      reader.readAsDataURL(file);
    });
    document.body.appendChild(quoteBgUpload);

    setInterval(() => {
      if(!document.hidden){
        renderButtons();
      }
    }, 1000);

    render();
  </script>
</body>
</html>
